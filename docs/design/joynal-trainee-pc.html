const WEEKDAYS = ['日','月','火','水','木','金','土'];

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function toDateStr(d) { return d.toISOString().slice(0,10); }

function fmtDateShort(dateStr) {
  const [,m,d] = dateStr.split('-');
  const wd = WEEKDAYS[new Date(dateStr).getDay()];
  return `${parseInt(m)}/${parseInt(d)}（${wd}）`;
}

function fmtWeekRange(mondayStr) {
  const mon = new Date(mondayStr);
  const fri = addDays(mon, 4);
  const [y,m,d] = mondayStr.split('-');
  const fd = String(fri.getDate()).padStart(2,'0');
  return `${y}/${m}/${d}（月）〜 ${parseInt(fri.getMonth()+1)}/${fd}（金）`;
}

function generateReports() {

  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const dow = d.getDay();
    if (dow === 0 || dow === 6) continue;
    if (Math.abs(Math.sin(d.getTime()*0.0001)) > 0.82) continue;
    const ds = toDateStr(d);

    const endHours = ['17:30','18:00','18:00','18:30','19:00'];

  }
  return reports;
}

// ── useContainerWidth ───────────────────────────────────────────
function useIsMobile(breakpoint = 767) {
  const [width, setWidth] = useState(document.documentElement.clientWidth);
  useEffect(() => {
    const ro = new ResizeObserver(entries => {
      setWidth(entries[0].contentRect.width);
    });
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, []);
  return width <= breakpoint;
}

function useIsMobileWithOverride(tweaks) {
  const detected = useIsMobile();
  return tweaks.mobilePreview || detected;
}

function Btn({ children, variant='solid', size='md', block, onClick, type='button', disabled, icon }) {
  const pad = size === 'sm' ? '5px 10px' : size === 'xs' ? '3px 8px' : '7px 14px';
  const fs = size === 'sm' ? 13 : size === 'xs' ? 12 : 14;
  const bg = {
    solid: 'var(--primary)', outline: 'transparent', ghost: 'transparent',
    danger: 'var(--danger)', 'danger-outline': 'transparent', soft: 'var(--primary-soft)',
  }[variant] || 'var(--primary)';
  const color = {
    solid: '#fff', outline: 'var(--primary)', ghost: 'var(--text-sub)',
    danger: '#fff', 'danger-outline': 'var(--danger)', soft: 'var(--primary)',
  }[variant] || '#fff';
  const border = {
    outline: '1px solid var(--primary-ring)', 'danger-outline': '1px solid #fca5a5',
  }[variant] || '1px solid transparent';
  const hoverBg = {
    solid: 'var(--primary-hover)', outline: 'var(--primary-soft)', ghost: 'var(--neutral-100)',
    danger: 'var(--danger-hover)', 'danger-outline': 'var(--danger-soft)', soft: '#e0e7ff',
  }[variant] || 'var(--primary-hover)';

  const [hovered, setHovered] = useState(false);
  const s = { ...btnBase, padding:pad, fontSize:fs, background: hovered && !disabled ? hoverBg : bg,
    color, border, opacity:disabled?0.5:1, cursor:disabled?'not-allowed':'pointer',
    width:block?'100%':undefined };

  return <button style={s} type={type} onClick={onClick} disabled={disabled}
    onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
    {children}
  </button>;
}

function Input({ type='text', value, onChange, placeholder, autoFocus }) {
  const [f, setF] = useState(false);
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} autoFocus={autoFocus}
    style={{ ...inputStyle, borderColor:f?'var(--border-focus)':'var(--border)',
      boxShadow:f?'0 0 0 3px var(--primary-ring)':undefined }}
    onFocus={() => setF(true)} onBlur={() => setF(false)} />;
}

function Textarea({ value, onChange, rows=5, placeholder }) {
  const [f, setF] = useState(false);
  return <textarea value={value} onChange={onChange} rows={rows} placeholder={placeholder}
    style={{ ...inputStyle, resize:'vertical', lineHeight:1.6,
      borderColor:f?'var(--border-focus)':'var(--border)',
      boxShadow:f?'0 0 0 3px var(--primary-ring)':undefined }}
    onFocus={() => setF(true)} onBlur={() => setF(false)} />;
}

function Select({ value, onChange, options, style: extraStyle }) {
  const [f, setF] = useState(false);
  return <select value={value} onChange={onChange}
    style={{ ...inputStyle, cursor:'pointer', ...extraStyle,
      borderColor:f?'var(--border-focus)':'var(--border)',
      boxShadow:f?'0 0 0 3px var(--primary-ring)':undefined }}
    onFocus={() => setF(true)} onBlur={() => setF(false)}>
    {options.map(o => <option key={typeof o==='string'?o:o.value} value={typeof o==='string'?o:o.value}>
      {typeof o==='string'?o:o.label}</option>)}
  </select>;
}

function Field({ label, error, children, required, hint }) {
  return <div style={{ marginBottom:16 }}>
    {label && <label style={{ display:'block', fontSize:13, fontWeight:500, marginBottom:5, color:'var(--neutral-700)' }}>
      {label}{required && <span style={{ color:'var(--danger)', marginLeft:3 }}>*</span>}
    </label>}
    {children}
    {hint && !error && <p style={{ fontSize:12, color:'var(--text-sub)', marginTop:4 }}>{hint}</p>}
    {error && <p style={{ fontSize:12, color:'var(--danger)', marginTop:4 }}>{error}</p>}
  </div>;
}

// ── Card ──────────────────────────────────────────────────────────

// ── Toast ─────────────────────────────────────────────────────────
function Toast({ message, type='success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? 'var(--success)' : 'var(--danger)';
  const icon = type === 'success' ? '✓' : '✕';
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, display:'flex', alignItems:'center',
    gap:10, background:'#1f2937', color:'#fff', padding:'10px 16px', borderRadius:'var(--radius)',
    boxShadow:'var(--shadow-lg)', fontSize:13, fontWeight:500, animation:'slideUp 0.2s ease' }}>
    <span style={{ width:18, height:18, background:bg, borderRadius:'50%', display:'flex', alignItems:'center',
      justifyContent:'center', fontSize:11, flexShrink:0 }}>{icon}</span>
    {message}
  </div>;
}

// ── Modal ─────────────────────────────────────────────────────────
function Modal({ title, onClose, children, size='md', fullScreenOnMobile }) {
  const _tweaksCtx = React.useContext(TweaksContext);
  const isMobile = useIsMobileWithOverride(_tweaksCtx);
  const fs = fullScreenOnMobile && isMobile;
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  return <div style={{ position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,0.4)',
    display:'flex', alignItems: fs?'stretch':'center', justifyContent: fs?'stretch':'center',
    padding: fs ? 0 : 16, overflowY:'auto' }}
    onClick={e => { if (e.target === e.currentTarget && !fs) onClose(); }}>
    <div style={{ background:'var(--surface)', borderRadius: fs ? 0 : 'var(--radius)',
      width: fs ? '100%' : '100%', maxWidth: size==='lg' ? 640 : size==='sm' ? 380 : 480,
      boxShadow:'var(--shadow-lg)', display:'flex', flexDirection:'column',
      margin: fs ? 0 : 'auto', animation:'fadeIn 0.15s ease',
      maxHeight: fs ? '100dvh' : 'calc(100dvh - 32px)', overflow:'hidden' }}>
      <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)',
        display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
        <span style={{ fontWeight:600, fontSize:15 }}>{title}</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer',
          fontSize:20, color:'var(--text-sub)', lineHeight:1, padding:2 }}>×</button>
      </div>
      <div style={{ padding:20, overflowY:'auto', flex:1 }}>{children}</div>
    </div>
  </div>;
}

function PwChangeForm({ onClose }) {
  const [f, setF] = useState({ current:'', next:'', confirm:'' });
  const [err, setErr] = useState({});
  function submit(e) {
    e.preventDefault();
    const errs = {};
    if (!f.current) errs.current = '入力してください';
    if (!f.next) errs.next = '入力してください';
    if (f.next !== f.confirm) errs.confirm = 'パスワードが一致しません';
    if (Object.keys(errs).length) { setErr(errs); return; }
    onClose();
  }
  return <form onSubmit={submit}>
    <Field label="現在のパスワード" error={err.current} required>
      <Input type="password" value={f.current} onChange={e => setF({...f, current:e.target.value})} />
    </Field>
    <Field label="新しいパスワード" error={err.next} required>
      <Input type="password" value={f.next} onChange={e => setF({...f, next:e.target.value})} />
    </Field>
    <Field label="新しいパスワード（確認）" error={err.confirm} required>
      <Input type="password" value={f.confirm} onChange={e => setF({...f, confirm:e.target.value})} />
    </Field>
    <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
      <Btn variant="ghost" onClick={onClose}>キャンセル</Btn>
      <Btn type="submit">変更する</Btn>
    </div>
  </form>;
}

// ── Star Rating ─────────────────────────────────────────────────
function StarRating({ value, onChange, readOnly, size=20 }) {
  const [hovered, setHovered] = useState(0);
  return <div style={{ display:'flex', gap:2 }}>
    {[1,2,3,4,5].map(n => {
      const filled = (hovered || value || 0) >= n;
      return <span key={n}
        onClick={() => !readOnly && onChange(value === n ? 0 : n)}
        onMouseEnter={() => !readOnly && setHovered(n)}
        onMouseLeave={() => !readOnly && setHovered(0)}
        style={{ fontSize:size, cursor: readOnly ? 'default' : 'pointer',
          color: filled ? '#f59e0b' : '#d1d5db',
          transition:'color 0.1s', lineHeight:1, userSelect:'none' }}>★</span>;
    })}
  </div>;
}

// ── Report Modal (newbie) ─────────────────────────────────────────
function ReportModal({ initial, dateStr, onSave, onDelete, onClose }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(initial || { date: dateStr || toDateStr(new Date()), start:'09:00', end:'18:00', content:'', mood:0 });
  const [errors, setErrors] = useState({});
  const [confirmDelete, setConfirmDelete] = useState(false);
  const _tweaksCtx = React.useContext(TweaksContext);
  const isMobile = useIsMobileWithOverride(_tweaksCtx);

  function validate() {
    const e = {};
    if (!form.start) e.start = '出勤時間を入力してください';
    if (!form.end) e.end = '退勤時間を入力してください';
    if (!form.content.trim()) e.content = 'やったことを入力してください';
    return e;
  }
  function submit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    onSave(form);
  }

  const dateLabel = form.date ? fmtDateShort(form.date) : '';

  return <Modal title={isEdit ? '日報を編集' : '日報を入力'} onClose={onClose} size="lg" fullScreenOnMobile>
    {confirmDelete ? <div style={{ textAlign:'center', padding:'20px 0' }}>
      <p style={{ fontWeight:600, marginBottom:8 }}>この日報を削除しますか？</p>
      <p style={{ color:'var(--text-sub)', fontSize:13, marginBottom:20 }}>削除すると元に戻せません。</p>
      <div style={{ display:'flex', justifyContent:'center', gap:8 }}>
        <Btn variant="ghost" onClick={() => setConfirmDelete(false)}>キャンセル</Btn>
        <Btn variant="danger" onClick={() => { onDelete(initial.id); onClose(); }}>削除する</Btn>
      </div>
    </div> : <form onSubmit={submit}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16,
        padding:'8px 12px', background:'var(--neutral-100)', borderRadius:'var(--radius-sm)' }}>
        <span style={{ fontSize:13, fontWeight:600 }}>{dateLabel}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        <Field label="出勤時間" error={errors.start} required>
          <input type="time" value={form.start} onChange={e => setForm({...form, start:e.target.value})} style={inputStyle} />
        </Field>
        <Field label="退勤時間" error={errors.end} required>
          <input type="time" value={form.end} onChange={e => setForm({...form, end:e.target.value})} style={inputStyle} />
        </Field>
      </div>
      <Field label="やったこと" error={errors.content} required>
        <Textarea value={form.content} onChange={e => setForm({...form, content:e.target.value})} rows={8}
          placeholder="本日の業務内容を記入してください" />
      </Field>
      <Field label="気分" hint="任意 — クリックで選択、もう一度クリックで解除">
        <StarRating value={form.mood || 0} onChange={v => setForm({...form, mood:v})} />
      </Field>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:4 }}>
        <div>
          {isEdit && <Btn variant="danger-outline" size="sm" onClick={() => setConfirmDelete(true)}>削除</Btn>}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="ghost" onClick={onClose}>キャンセル</Btn>
          <Btn type="submit">{isEdit ? '更新' : '保存'}</Btn>
        </div>
      </div>
    </form>}
  </Modal>;
}

// ── Week Picker Modal ─────────────────────────────────────────────
function WeekPickerModal({ currentWeek, onSelect, onClose }) {
  const initial = new Date(currentWeek);
  const [viewYear, setViewYear] = useState(initial.getFullYear());
  const [viewMonth, setViewMonth] = useState(initial.getMonth());
  const [hoverWeek, setHoverWeek] = useState(null);

  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  function prevMonth() {
    if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y-1); }
    else setViewMonth(m => m-1);
  }
  function nextMonth() {
    if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y+1); }
    else setViewMonth(m => m+1);
  }

  // Build calendar grid
  const firstDay = new Date(viewYear, viewMonth, 1);
  const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1; // Mon=0
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(viewYear, viewMonth, d));
  // Pad to complete weeks
  while (cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  const today = toDateStr(new Date());

  return <div style={{ position:'fixed', inset:0, zIndex:600, background:'rgba(0,0,0,0.4)',
    display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
    onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
    <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', boxShadow:'var(--shadow-lg)',
      width:320, overflow:'hidden', animation:'fadeIn 0.15s ease' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'14px 16px', borderBottom:'1px solid var(--border)' }}>
        <button onClick={prevMonth} style={{ background:'none', border:'none', cursor:'pointer',
          fontSize:16, color:'var(--text-sub)', padding:'2px 8px', borderRadius:'var(--radius-sm)' }}>‹</button>
        <span style={{ fontWeight:600, fontSize:15 }}>{viewYear}年 {MONTHS[viewMonth]}</span>
        <button onClick={nextMonth} style={{ background:'none', border:'none', cursor:'pointer',
          fontSize:16, color:'var(--text-sub)', padding:'2px 8px', borderRadius:'var(--radius-sm)' }}>›</button>
      </div>
      {/* Day headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)',
        padding:'8px 12px 4px', gap:2 }}>
        {['月','火','水','木','金','土','日'].map(d =>
          <div key={d} style={{ textAlign:'center', fontSize:11, fontWeight:600,
            color: d==='土'?'#0891b2': d==='日'?'#dc2626':'var(--text-sub)', padding:'2px 0' }}>{d}</div>)}
      </div>
      {/* Weeks */}
      <div style={{ padding:'4px 12px 12px', display:'flex', flexDirection:'column', gap:2 }}>
        {weeks.map((week, wi) => {
          const mondayCell = week.find(d => d && d.getDay() === 1) || week.find(d => d);
          const weekMonStr = mondayCell ? toDateStr(getMonday(mondayCell)) : null;
          const isSelected = weekMonStr === currentWeek;
          const isHovered = weekMonStr && weekMonStr === hoverWeek;
          return <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2,
            background: isSelected ? 'var(--primary-soft)' : isHovered ? 'var(--neutral-100)' : 'transparent',
            borderRadius:'var(--radius-sm)', cursor:'pointer', transition:'background 0.1s' }}
            onClick={() => { if (weekMonStr) { onSelect(weekMonStr); onClose(); }}}
            onMouseEnter={() => setHoverWeek(weekMonStr)}
            onMouseLeave={() => setHoverWeek(null)}>
            {week.map((d, di) => {
              const ds = d ? toDateStr(d) : null;
              const isToday = ds === today;
              const isWeekend = d && (d.getDay() === 0 || d.getDay() === 6);
              return <div key={di} style={{ textAlign:'center', padding:'5px 2px', fontSize:13,
                fontWeight: isToday ? 700 : isSelected ? 600 : 400,
                color: !d ? 'transparent' : isToday ? 'var(--primary)' : isWeekend ? '#9ca3af' : 'var(--text)',
                borderRadius:'var(--radius-sm)',
              }}>{d ? d.getDate() : '·'}</div>;
            })}
          </div>;
        })}
      </div>
      <div style={{ padding:'8px 12px 14px', display:'flex', justifyContent:'center' }}>
        <Btn variant="ghost" size="sm" onClick={onClose}>キャンセル</Btn>
      </div>
    </div>
  </div>;
}

// ── Week Navigator ────────────────────────────────────────────────
function WeekNav({ weekStart, onChange, isMobile }) {
  const todayMonday = toDateStr(getMonday(new Date()));
  const isToday = weekStart === todayMonday;
  const [showPicker, setShowPicker] = useState(false);

  function prev() {
    const d = new Date(weekStart); d.setDate(d.getDate() - 7);
    onChange(toDateStr(d));
  }
  function next() {
    const d = new Date(weekStart); d.setDate(d.getDate() + 7);
    onChange(toDateStr(d));
  }

  const dateLabel = <span onClick={() => setShowPicker(true)}
    style={{ display:'block', fontWeight:500, textAlign:'center',
      padding: isMobile ? '5px 8px' : '5px 10px',
      fontSize: isMobile ? 13 : 14,
      background:'var(--neutral-100)', borderRadius:'var(--radius-sm)',
      userSelect:'none', borderBottom:'1px dashed var(--border-focus)', cursor:'pointer' }}>
    {fmtWeekRange(weekStart)}
  </span>;

  return <>
    {isMobile
      ? <div style={{ display:'flex', alignItems:'center', gap:8, width:'100%' }}>
          <Btn variant="outline" size="sm" onClick={prev}>←</Btn>
          <div style={{ flex:1 }}>{dateLabel}</div>
          <Btn variant="outline" size="sm" onClick={next}>→</Btn>
          {!isToday && <Btn variant="soft" size="sm" onClick={() => onChange(todayMonday)}>今週</Btn>}
        </div>
      : <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          <Btn variant="outline" size="sm" onClick={prev}>← 前の週</Btn>
          {dateLabel}
          <Btn variant="outline" size="sm" onClick={next}>次の週 →</Btn>
          {!isToday && <Btn variant="soft" size="sm" onClick={() => onChange(todayMonday)}>今週</Btn>}
        </div>
    }
    {showPicker && <WeekPickerModal currentWeek={weekStart} onSelect={onChange} onClose={() => setShowPicker(false)} />}
  </>;
}

// ── Day Row ───────────────────────────────────────────────────────
function DayRow({ dateStr, report, role, onInput, onEdit, onToggleDetail, isExpanded, isMobile }) {
  const isWeekend = [0,6].includes(new Date(dateStr).getDay());
  if (isWeekend) return null;
  const hasReport = !!report;
  const isNewbie = role === 'newbie';
  const today = toDateStr(new Date());
  const isToday = dateStr === today;

  const PencilIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

  const actionBtn = isNewbie ? (
    hasReport
      ? <Btn variant="ghost" size="sm" onClick={() => onEdit(report)}><PencilIcon /></Btn>
      : <Btn variant="ghost" size="sm" onClick={() => onInput(dateStr)}><PencilIcon /></Btn>
  ) : (
    hasReport
      ? <Btn variant="ghost" size="sm" onClick={() => onToggleDetail(dateStr)}>
          {isExpanded ? '▲' : '▼'}
        </Btn>
      : null
  );

  if (isMobile) return <div style={{ borderBottom:'1px solid var(--border)' }}>
    <div style={{ padding:'12px 16px', background: isToday ? '#fafafa' : 'var(--surface)', cursor: hasReport ? 'pointer' : 'default' }}
      onClick={() => hasReport && onToggleDetail(dateStr)}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: hasReport ? 4 : 0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:13, fontWeight:600, color: isToday ? 'var(--primary)' : 'var(--text)' }}>{fmtDateShort(dateStr)}</span>
          {hasReport && <span style={{ fontSize:12, color:'var(--text-sub)' }}>{report.start} 〜 {report.end}</span>}
          {!hasReport && <span style={{ fontSize:12, color:'var(--text-xs)' }}>未入力</span>}
        </div>
        <div style={{ display:'flex', gap:6, alignItems:'center' }} onClick={e => e.stopPropagation()}>
          {actionBtn}
        </div>
      </div>
      {hasReport && !isExpanded && <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:2 }}>
        <p style={{ fontSize:13, color:'var(--text-sub)', overflow:'hidden',
          textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>{report.content.slice(0,60)}…</p>
        {report.mood > 0 && <StarRating value={report.mood} readOnly size={12} />}
      </div>}
    </div>
    {isExpanded && hasReport && <div style={{ padding:'12px 16px', background:'#fafbff',
      borderTop:'1px solid var(--border)', animation:'fadeIn 0.15s ease' }}>
      <p style={{ fontSize:14, lineHeight:1.85, wordBreak:'break-all', whiteSpace:'pre-wrap' }}>{report.content}</p>
    </div>}
  </div>;

  return <div style={{ borderBottom:'1px solid var(--border)' }}>
    <div style={{ display:'flex', alignItems:'center', minHeight:48,
      background: isToday ? '#fafafa' : 'var(--surface)',
      cursor: hasReport ? 'pointer' : 'default', transition:'background 0.1s' }}
      onClick={() => hasReport && onToggleDetail(dateStr)}>
      <div style={{ width:130, flexShrink:0, padding:'10px 16px', display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ fontSize:13, fontWeight: isToday ? 600 : 400,
          color: isToday ? 'var(--primary)' : 'var(--text)' }}>{fmtDateShort(dateStr)}</span>
        {isToday && <span style={{ width:6, height:6, borderRadius:'50%',
          background:'var(--primary)', display:'inline-block', flexShrink:0 }} />}
      </div>
      <div style={{ width:140, flexShrink:0, padding:'10px 8px', fontSize:13, color:'var(--text-sub)' }}>
        {hasReport ? `${report.start} 〜 ${report.end}` : '——'}
      </div>
      <div style={{ flex:1, padding:'10px 8px', fontSize:13, color: hasReport ? 'var(--text)' : 'var(--text-xs)',
        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
        {hasReport ? report.content.slice(0, 80) + (report.content.length > 80 ? '…' : '') : '未入力'}
      </div>
      <div style={{ width:80, flexShrink:0, padding:'10px 8px', display:'flex', alignItems:'center', justifyContent:'center' }}>
        {hasReport && report.mood > 0 && <StarRating value={report.mood} readOnly size={14} />}
      </div>
      <div style={{ width:90, flexShrink:0, padding:'10px 12px', display:'flex', justifyContent:'flex-end' }}
        onClick={e => e.stopPropagation()}>
        {actionBtn}
      </div>
    </div>
    {isExpanded && hasReport && <div style={{ padding:'16px 20px', background:'#fafbff',
      borderTop:'1px solid var(--border)', animation:'fadeIn 0.15s ease' }}>
      <div style={{ display:'flex', gap:16, flexWrap:'wrap', marginBottom:12 }}>
        <span style={{ fontSize:13, color:'var(--text-sub)' }}>出勤 <strong style={{color:'var(--text)'}}>{report.start}</strong></span>
        <span style={{ fontSize:13, color:'var(--text-sub)' }}>退勤 <strong style={{color:'var(--text)'}}>{report.end}</strong></span>
        {report.mood > 0 && <span style={{ display:'flex', alignItems:'center', gap:4, fontSize:13, color:'var(--text-sub)' }}>気分 <StarRating value={report.mood} readOnly size={14} /></span>}
      </div>

// ── 3. Report Screen (shared) ─────────────────────────────────────
function ReportScreen({ user, onLogout, onNav, tweaks }) {
  const role = user.role; // 'newbie' | 'mentor' | 'ojt' | 'admin'
  const isAdmin = role === 'admin';
  const isNewbie = role === 'newbie';

  const todayMonday = toDateStr(getMonday(new Date()));
  const [weekStart, setWeekStart] = useState(todayMonday);
  const [selectedNewbie, setSelectedNewbie] = useState(isAdmin ? '' : '山田 太郎');
  const [reports, setReports] = useState(ALL_REPORTS);
  const [comments, setComments] = useState(MOCK_COMMENTS);
  const [expandedDate, setExpandedDate] = useState(null);
  const [reportModal, setReportModal] = useState(null);
  const [commentModal, setCommentModal] = useState(null);
  const [toast, setToast] = useState(null);
  const _tweaksCtx = React.useContext(TweaksContext);
  const isMobile = useIsMobileWithOverride(_tweaksCtx);

  // Days Mon-Fri for current week
  const weekDays = useMemo(() => {
    const mon = new Date(weekStart);
    return Array.from({length:5}, (_, i) => toDateStr(addDays(mon, i)));
  }, [weekStart]);

  // Reports for this week
  const weekReports = useMemo(() => {
    const map = {};
    reports.forEach(r => { if (weekDays.includes(r.date)) map[r.date] = r; });
    return map;
  }, [reports, weekDays]);

  // Comments
  const mentorComment = comments.mentor?.[weekStart];
  const ojtComment = comments.ojt?.[weekStart];

  function saveReport(form) {
    if (reportModal?.report) {
      setReports(rs => rs.map(r => r.id === reportModal.report.id ? {...r, ...form} : r));
      setToast({ msg:'日報を更新しました' });
    } else {
      setReports(rs => [...rs, { id: Date.now(), ...form, date: reportModal.date }]);
      setToast({ msg:'日報を保存しました' });
    }
    setReportModal(null);
  }

  function deleteReport(id) {
    setReports(rs => rs.filter(r => r.id !== id));
    setToast({ msg:'日報を削除しました' });
  }

  function saveComment(who, text) {
    setComments(c => ({ ...c, [who]: { ...c[who], [weekStart]: text } }));
    setToast({ msg:'コメントを保存しました' });
  }

  function toggleDetail(dateStr) {
    setExpandedDate(v => v === dateStr ? null : dateStr);
  }

  const showContent = !isAdmin || !!selectedNewbie;

  // Newbie selector (non-newbie roles)
  const newbieSelector = !isNewbie && <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
    <span style={{ fontSize:13, color:'var(--text-sub)', whiteSpace:'nowrap' }}>対象:</span>
    <select value={selectedNewbie}
      onChange={e => { setSelectedNewbie(e.target.value); setExpandedDate(null); }}
      style={{ ...inputStyle, width:'auto', minWidth:140 }}>
      {isAdmin && <option value=''>選択してください</option>}
      <option>山田 太郎</option>
      <option>鈴木 花子</option>
    </select>
  </div>;

  const adminTabs = isAdmin && onNav ? (
    <div style={{ borderBottom:'1px solid var(--border)', background:'var(--surface)' }}>
      <div style={{ maxWidth:960, margin:'0 auto', padding:'0 16px', display:'flex', gap:2 }}>
        {[{id:'report',label:'日報'},{id:'admin',label:'管理'}].map(t =>
          <button key={t.id} onClick={() => onNav(t.id)} style={{
            padding:'10px 20px', background:'none', border:'none', cursor:'pointer',
            fontFamily:'inherit', fontSize:14, fontWeight:500,
            color: 'report'===t.id ? 'var(--primary)' : 'var(--text-sub)',
            borderBottom: 'report'===t.id ? '2px solid var(--primary)' : '2px solid transparent',
            marginBottom:-1, transition:'color 0.1s',
          }}>{t.label}</button>)}
      </div>
    </div>
  ) : null;

  return <>
    <Header user={user} onLogout={onLogout} />
    {adminTabs}
    <main style={{ maxWidth:960, margin:'0 auto', padding:'20px 16px' }}>

      {!showContent ? (
        <Card style={{ padding:40, display:'flex', flexDirection:'column', alignItems:'center',
          justifyContent:'center', minHeight:280, textAlign:'center', gap:16 }}>
          <span style={{ fontSize:36, opacity:0.4 }}>📋</span>
          <p style={{ color:'var(--text-sub)', fontSize:14 }}>表示したい新人の日報を選んでください</p>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <select value={selectedNewbie} onChange={e => setSelectedNewbie(e.target.value)}
              style={{ ...inputStyle, width:'auto', minWidth:160 }}>
              <option value=''>選択してください</option>
              <option>山田 太郎</option>
              <option>鈴木 花子</option>
            </select>
          </div>
        </Card>
      ) : (
        <Card>
          {/* Week nav */}
          <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)',
            display:'flex', flexDirection: isMobile ? 'column' : 'row',
            alignItems: isMobile ? 'stretch' : 'center',
            justifyContent:'space-between', flexWrap:'wrap', gap:10 }}>
            <WeekNav weekStart={weekStart} onChange={ws => { setWeekStart(ws); setExpandedDate(null); }} isMobile={isMobile} />
            {!isNewbie && (!isMobile) && <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <select value={selectedNewbie} onChange={e => { setSelectedNewbie(e.target.value); setExpandedDate(null); }}
                style={{ ...inputStyle, width:'auto', minWidth:140 }}>
                {isAdmin && <option value=''>選択してください</option>}
                <option>山田 太郎</option>
                <option>鈴木 花子</option>
              </select>
            </div>}
          </div>
          {!isNewbie && isMobile && <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)', background:'var(--neutral-50)' }}>
            <select value={selectedNewbie} onChange={e => { setSelectedNewbie(e.target.value); setExpandedDate(null); }}
              style={{ ...inputStyle, width:'100%' }}>
              {isAdmin && <option value=''>選択してください</option>}
              <option>山田 太郎</option>
              <option>鈴木 花子</option>
            </select>
          </div>}

          {/* Table header - desktop only */}
          {!isMobile && <div style={{ display:'flex', alignItems:'center', background:'var(--neutral-50)',
            borderBottom:'1px solid var(--border)', fontSize:12, fontWeight:600,
            color:'var(--text-sub)', letterSpacing:'0.04em' }}>
              <div style={{ width:130, flexShrink:0, padding:'8px 16px' }}>日付</div>
            <div style={{ width:140, flexShrink:0, padding:'8px 8px' }}>出退勤</div>
            <div style={{ flex:1, padding:'8px 8px' }}>やったこと</div>
            <div style={{ width:80, flexShrink:0, padding:'8px 8px', textAlign:'center' }}>気分</div>
            <div style={{ width:90, flexShrink:0, padding:'8px 12px' }}></div>
          </div>}

          {/* Day rows */}
          {weekDays.map(dateStr => (
            <DayRow key={dateStr} dateStr={dateStr} report={weekReports[dateStr]}
              role={role}
              onInput={(ds) => setReportModal({ date: ds })}
              onEdit={(rep) => setReportModal({ report: rep, date: rep.date })}
              onToggleDetail={toggleDetail}
              isExpanded={expandedDate === dateStr}
              isMobile={isMobile} />
          ))}

          {/* Comment area */}
          <CommentArea weekStart={weekStart} role={role}
            mentorComment={mentorComment} ojtComment={ojtComment}
            onEditComment={(who) => setCommentModal({ who, initial: who === 'mentor' ? mentorComment : ojtComment })}
            isMobile={isMobile} />
        </Card>
      )}
    </main>

    {reportModal && <ReportModal
      initial={reportModal.report}
      dateStr={reportModal.date}
      onSave={saveReport}
      onDelete={deleteReport}
      onClose={() => setReportModal(null)} />}

    {commentModal && <CommentModal
      weekStr={weekStart}
      initial={commentModal.initial}
      onSave={(text) => saveComment(commentModal.who, text)}
      onClose={() => setCommentModal(null)} />}

    {toast && <Toast message={toast.msg} onClose={() => setToast(null)} />}
  </>;
}

// ── App ───────────────────────────────────────────────────────────
const ROLE_MAP = {
  newbie: { name:'山田 太郎', role:'newbie' },
  mentor: { name:'田中 一郎', role:'mentor' },
  ojt:    { name:'佐藤 美咲', role:'ojt' },
  admin:  { name:'高橋 健二', role:'admin' },
};

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('login'); // login | reset | report | admin
  const [user, setUser] = useState(null);
  const [tweakVisible, setTweakVisible] = useState(false);

  // Tweaks integration
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Auto-login on load based on tweak role
    const roleKey = TWEAK_DEFAULTS.role || 'newbie';
    const resolved = ROLE_MAP[roleKey] || ROLE_MAP.newbie;
    setUser(resolved);
    setScreen('report');
  }, []);

  // Auto-update when role tweak changes
  useEffect(() => {
    const resolved = ROLE_MAP[tweaks.role] || ROLE_MAP.newbie;
    setUser(resolved);
    setScreen('report');
  }, [tweaks.role]);

  function login(u) {
    const roleKey = tweaks.role || 'newbie';
    const resolved = ROLE_MAP[roleKey] || ROLE_MAP.newbie;
    setUser(resolved);
    setScreen('report');
  }

  function logout() { setUser(null); setScreen('login'); }

  function applyTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }

  // Apply primary color
  useEffect(() => {
    document.documentElement.style.setProperty('--primary', tweaks.primaryColor || '#4f46e5');
  }, [tweaks.primaryColor]);

  return <TweaksContext.Provider value={tweaks}>
    {screen === 'login' && <LoginScreen onLogin={login} onReset={() => setScreen('reset')} />}
    {screen === 'reset' && <ResetScreen onBack={() => setScreen('login')} />}
    {screen === 'report' && <ReportScreen user={user} onLogout={logout} onNav={setScreen} tweaks={tweaks} />}
    {screen === 'admin' && <AdminScreen user={user} onLogout={logout} onNav={setScreen} tweaks={tweaks} />}

    {/* Tweaks panel */}
    {tweakVisible && <div style={{ position:'fixed', bottom:20, right:20, zIndex:9000,
      background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius)',
      boxShadow:'var(--shadow-lg)', padding:16, width:240, animation:'slideUp 0.2s ease' }}>
      <p style={{ fontWeight:600, fontSize:13, marginBottom:12 }}>Tweaks</p>
      <Field label="ロール">
        <select value={tweaks.role} onChange={e => applyTweak('role', e.target.value)} style={inputStyle}>
          <option value="newbie">新人</option>
          <option value="mentor">メンター</option>
          <option value="ojt">OJT</option>
          <option value="admin">管理者</option>
        </select>
      </Field>
      <Field label="アクセントカラー">
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {['#4f46e5','#0891b2','#059669','#d97706','#dc2626'].map(c =>
            <button key={c} onClick={() => applyTweak('primaryColor', c)} style={{
              width:24, height:24, borderRadius:'50%', background:c, border:'none',
              cursor:'pointer', outline: tweaks.primaryColor === c ? `3px solid ${c}` : '3px solid transparent',
              outlineOffset:2,
            }} />)}
        </div>
      </Field>
      <Field label="">
        <label style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13 }}>
          <input type="checkbox" checked={!!tweaks.mobilePreview}
            onChange={e => applyTweak('mobilePreview', e.target.checked)} />
          スマホ表示でプレビュー
        </label>
      </Field>
      <div style={{ marginTop:8 }}>
        <Btn variant="soft" size="sm" block onClick={() => {
          const roleKey = tweaks.role || 'newbie';
          const resolved = ROLE_MAP[roleKey] || ROLE_MAP.newbie;
          setUser(resolved);
          setScreen('report');
        }}>このロールで画面を開く</Btn>
      </div>
    </div>}
  </TweaksContext.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
