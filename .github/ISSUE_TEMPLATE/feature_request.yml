name: 機能要望 / タスク
description: 新機能の提案や改善タスクを起票する
labels: ["enhancement"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜこの機能・改善が必要かを書いてください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 何を実現したいかを具体的に書いてください。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: どうなれば完了とみなすかを箇条書きで書いてください。
      placeholder: |
        - [ ] ◯◯が表示される
        - [ ] △△を保存できる
    validations:
      required: false
