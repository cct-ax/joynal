name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # Lint と型チェック。pnpm のバージョンは固定せず packageManager(pnpm@11.5.0) に従わせる。
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec nuxt typecheck

  # ユニット・統合テスト（Vitest）。lint-and-typecheck と並列で実行される。
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm test

  # 本番ビルド（Nitro / Cloudflare Pages プリセット）。
  # @nuxtjs/supabase は URL/KEY 未設定だと warn を出すだけだが、
  # ビルドを密閉化するためダミーの public 値を渡しておく（ビルド時に実 Supabase へは接続しない）。
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NUXT_PUBLIC_SUPABASE_KEY: build-time-dummy-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

  # シークレット検出 + 依存の既知脆弱性チェック。
  security:
    runs-on: ubuntu-latest
    steps:
      # gitleaks は履歴の差分を見るため fetch-depth: 0 でフル履歴を取得する。
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # シークレット検出。検出すると非ゼロ終了でこのジョブが fail する。
      # 個人アカウントのリポジトリではライセンスキー不要（組織アカウントなら
      # GITLEAKS_LICENSE secret が必要なので、その場合は下記コメントを有効化する）。
      # 設定はルートの .gitleaks.toml を自動検出して使用する。
      # pull_request イベントでは PR の差分コミットを対象にスキャンする。
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          # PR への自動コメント用。Actions が自動発行するトークンで足りる。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 組織アカウント配下に移行した場合は以下を有効化:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # 依存ツリーに high 以上の既知脆弱性があれば fail する。
      # （devalue の high は pnpm-workspace.yaml の overrides で patched 版へ底上げ済み）
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
