name: CI

on:
  pull_request:

# 同一 PR への連打 push（synchronize）で古い実行を打ち切り無駄を削減する。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN を最小権限に固定する。本 CI は PR 上で checkout / install / lint / test /
# build / pnpm audit を行うのみでリポジトリへの書き込みは不要なため contents: read で十分。
# top-level に置くことで全ジョブへ適用される。
permissions:
  contents: read

jobs:
  # Lint と型チェック。pnpm のバージョンは固定せず packageManager(pnpm@11.5.0) に従わせる。
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec nuxt typecheck

  # ユニット・統合テスト（Vitest）。lint-and-typecheck 通過後に build/security と並列で実行される。
  test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm test

  # 本番ビルド（Nitro / Cloudflare Pages プリセット）。
  # @nuxtjs/supabase は URL/KEY 未設定だと warn を出すだけだが、
  # ビルドを密閉化するためダミーの public 値を渡しておく（ビルド時に実 Supabase へは接続しない）。
  build:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NUXT_PUBLIC_SUPABASE_KEY: build-time-dummy-anon-key
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

  # 依存の既知脆弱性チェック。
  security:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # 依存ツリーに high 以上の既知脆弱性があれば fail する。
      # （devalue の high は pnpm-workspace.yaml の overrides で patched 版へ底上げ済み）
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
