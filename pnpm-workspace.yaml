allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  # @unovis/ts の地図コンポーネント用 transitive 依存。日報の mood 推移グラフでは地図を使わないためビルド不要。
  maplibre-gl: false
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
overrides:
  cac: "^6.7.14"
  commander: "^13.1.0"
  # devalue <5.8.1 は GHSA-77vg-94rm-hx3p（sparse array deserialization の DoS, high）。
  # nuxt/nitro 経由の推移的依存。patched 版へ底上げして pnpm audit --audit-level=high を green に保つ。
  devalue: "^5.8.1"
