allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
overrides:
  cac: "^6.7.14"
  commander: "^13.1.0"
  # devalue <5.8.1 は GHSA-77vg-94rm-hx3p（sparse array deserialization の DoS, high）。
  # nuxt/nitro 経由の推移的依存。patched 版へ底上げして pnpm audit --audit-level=high を green に保つ。
  devalue: "^5.8.1"
  # shell-quote <=1.8.3 は GHSA-w7jw-789q-3m8p（critical）。launch-editor が推移的に引く。
  shell-quote: "^1.8.4"
  # esbuild <0.28.1 は GHSA-gv7w-rqvm-qjhr（low）。Vite/fontless が推移的に引く。
  esbuild: "^0.28.1"
  # ws <8.21.0 は GHSA-96hv-2xvq-fx4p（high）。Supabase realtime が推移的に引く。
  ws: "^8.21.0"
  # vite <=7.3.4 は GHSA-fx2h-pf6j-xcff（high）。Nuxt UI/dev tooling が推移的に引く。
  vite: "^7.3.5"
  # undici <7.28.0 は GHSA-vmh5-mc38-953g / GHSA-vxpw-j846-p89q / GHSA-hm92-r4w5-c3mj（high）。Wrangler/miniflare が推移的に引く。
  undici: "^7.28.0"
  # tar <=7.5.15 は GHSA（PAX size override による parser interpretation differential / file smuggling, medium）。推移的依存。
  tar: "^7.5.16"
  # launch-editor <=2.14.0 は GHSA（Windows UNC パス経由の NTLMv2 hash 漏えい, medium）。Vite 経由の推移的依存。
  launch-editor: "^2.14.1"
  # brace-expansion <5.0.6 は GHSA-v6h2-p8h4-qcjw（ReDoS, medium）。推移的依存。
  brace-expansion: "^5.0.6"
  # js-yaml <=4.1.1 は GHSA-h67p-54hq-rp68（merge key の二次計算量 DoS, moderate）。eslint-typegen 経由の推移的依存。
  js-yaml: "^4.1.2"
  # @babel/core <=7.29.0 は GHSA-4x5r-pxfx-6jf8（sourceMappingURL 経由の任意ファイル読み取り, low）。nitro/vite builder 経由の推移的依存。
  "@babel/core": "^7.29.1"